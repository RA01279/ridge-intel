<!-- Card base — used by every preview card. Loads tokens + sets a 700px stage. -->
<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--font-system); }
  body { width: 700px; padding: 18px 22px; box-sizing: border-box; }
  .card-light { background: #FFFFFF; color: var(--entrada-ink); }
  .row  { display: flex; gap: 12px; align-items: stretch; }
  .col  { display: flex; flex-direction: column; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .swatch { border-radius: var(--radius); padding: 14px 12px; min-height: 88px; display: flex; flex-direction: column; justify-content: space-between; }
  .swatch .name { font: 700 11px var(--font-mono); letter-spacing: 1px; text-transform: uppercase; }
  .swatch .hex  { font: 500 10px var(--font-mono); letter-spacing: .5px; opacity: .85; }
  .swatch .role { font: 500 10px var(--font-system); opacity: .75; margin-top: 4px; }
</style>
</head><body></body></html>
